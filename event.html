        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else {
                const hour = new Date().getHours();
                if (hour >= 6 && hour < 18) {
                    document.documentElement.setAttribute('data-theme', 'light');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            }
        })();

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 昼夜切换逻辑
            const toggleBtn = document.getElementById('themeToggle');
            const icon = toggleBtn.querySelector('i');
            function updateIcon() {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'light') { icon.className = 'fa-solid fa-sun'; } 
                else { icon.className = 'fa-solid fa-moon'; }
            }
            updateIcon();
            toggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                let newTheme = currentTheme === 'dark' || !currentTheme ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateIcon();
            });

            // 分类筛选逻辑 (Filter)
            const filterBtns = document.querySelectorAll('.filter-btn');
            const eventRows = document.querySelectorAll('.event-row');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // 1. 切换按钮高亮状态
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    // 2. 获取当前点击的分类 (all, music, academic)
                    const filterValue = btn.getAttribute('data-filter');

                    // 3. 遍历所有活动，匹配的显示，不匹配的隐藏
                    eventRows.forEach(row => {
                        if (filterValue === 'all' || row.getAttribute('data-category') === filterValue) {
                            row.style.display = 'flex'; // 恢复显示
                        } else {
                            row.style.display = 'none'; // 隐藏
                        }
                    });
                });
            });
        });
    </script>
