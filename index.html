    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else {
                const hour = new Date().getHours();
                if (hour >= 6 && hour < 18) {
                    document.documentElement.setAttribute('data-theme', 'light');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            }
        })();
    </script>
</head>

    <script>
        // 1. 昼夜模式交互逻辑
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('themeToggle');
            const icon = toggleBtn.querySelector('i');
            
            function updateIcon() {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'light') {
                    icon.className = 'fa-solid fa-sun'; // 白天显示太阳
                } else {
                    icon.className = 'fa-solid fa-moon'; // 晚上显示月亮
                }
            }
            updateIcon();

            toggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                let newTheme = 'dark';
                if (currentTheme === 'dark' || !currentTheme) {
                    newTheme = 'light';
                }
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme); // 记住用户的强行手动修改
                updateIcon();
            });
        });

        // 2. 打字机效果
        const words = ["Pianist.", "Math Student.", "Creative Coder."];
        let i = 0; let timer;
        function typingEffect() {
            let word = words[i].split("");
            var loopTyping = function() {
                if (word.length > 0) { document.querySelector('.typing-text').innerHTML += word.shift(); } 
                else { setTimeout(deletingEffect, 2000); return false; }
                timer = setTimeout(loopTyping, 100);
            };
            loopTyping();
        }
        function deletingEffect() {
            let word = words[i].split("");
            var loopDeleting = function() {
                if (word.length > 0) { word.pop(); document.querySelector('.typing-text').innerHTML = word.join(""); } 
                else { if (words.length > (i + 1)) { i++; } else { i = 0; } typingEffect(); return false; }
                timer = setTimeout(loopDeleting, 50);
            };
            loopDeleting();
        }
        typingEffect();
    </script>
</body>
